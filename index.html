<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Кешфлоу">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Сімейний Кешфлоу</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1e;--card:rgba(26,26,48,0.75);--card2:rgba(30,30,55,0.65);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.03);
  --text:#d8dae6;--text2:#eceef6;--head:#ffffff;
  --muted:#7d80a1;--muted2:#5c5f80;
  --green:#3de8a8;--red:#ff6b7f;--blue:#6cb4ff;
  --indigo:#a0a4ff;--yellow:#ffd04a;--cyan:#38ecf8;
  --pink:#ff85bc;--purple:#c4a0ff;--orange:#ffb05c;
  --glass:rgba(255,255,255,0.04);
}
html{background:#0a0a18}
body{background:
  radial-gradient(ellipse 80% 60% at 20% 10%,rgba(100,80,255,0.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(56,236,248,0.06) 0%,transparent 50%),
  radial-gradient(ellipse 50% 40% at 50% 50%,rgba(255,133,188,0.04) 0%,transparent 50%),
  #0f0f1e;
  min-height:100vh;min-height:100dvh}
#root{color:var(--text);
  font-family:-apple-system,'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased}
button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

/* splash */
@keyframes splashFade{0%{opacity:1}80%{opacity:1}100%{opacity:0;pointer-events:none}}
@keyframes logoGlow{0%{opacity:0;transform:scale(0.9) translateY(10px)}40%{opacity:1;transform:scale(1) translateY(0)}100%{opacity:1}}
@keyframes subtitleIn{0%{opacity:0;letter-spacing:0.4em}60%{opacity:0}100%{opacity:0.6;letter-spacing:0.18em}}
.splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:radial-gradient(ellipse at 50% 40%,#1a1a3a 0%,#0f0f1e 70%);
  animation:splashFade 2.4s ease-in forwards}
.splash-title{font-size:28px;font-weight:800;letter-spacing:-0.02em;
  background:linear-gradient(135deg,#a0a4ff 0%,#38ecf8 50%,#ff85bc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:logoGlow 1s ease-out}
.splash-sub{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.18em;font-weight:600;animation:subtitleIn 2s ease-out}

/* responsive shell */
.shell{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh}
.header{padding:18px 16px 0;padding-top:calc(12px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(15,15,30,0.85);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);z-index:10}
.content{padding:14px 16px 76px}
/* bottom tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(20,20,40,0.88);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  box-shadow:0 -4px 24px rgba(0,0,0,0.4);
  display:flex;justify-content:space-around;align-items:center;
  height:56px;padding-bottom:env(safe-area-inset-bottom);
  max-width:480px;margin:0 auto}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px 12px;
  min-width:44px;min-height:44px;
  -webkit-tap-highlight-color:transparent;transition:color 0.15s}
.tab-btn svg{width:20px;height:20px}
.tab-btn span{font-size:10px;font-weight:600;letter-spacing:0.02em}

@media(min-width:420px){
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
}
@media(min-width:540px){
  .header{padding-left:20px;padding-right:20px}
  .content{padding-left:20px;padding-right:20px}
}
/* tooltip */
.tip{position:absolute;background:rgba(22,22,44,0.92);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:7px 12px;font-size:11px;color:#fff;
  white-space:nowrap;pointer-events:none;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:translateX(-50%);
  font-variant-numeric:tabular-nums}

/* Блокування landscape на мобільних */
@media(orientation:landscape) and (max-height:500px){
  #root{display:none !important}
  body::after{
    content:'Поверніть пристрій вертикально';
    display:flex;align-items:center;justify-content:center;
    height:100vh;width:100%;position:fixed;top:0;left:0;
    font-size:18px;color:#7d80a1;text-align:center;
    padding:40px;background:#0f0f1e;z-index:9999;
  }
}
/* tab content animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tab-page{animation:fadeIn 0.22s ease-out}
@keyframes stagger{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<script>
'use strict';
const{useState,useMemo,useEffect,createElement:h,Fragment}=React;
const e=(tag,props,...ch)=>h(tag,props,...ch);

/* ——— HELPERS ——— */
const getDow=(y,m,d)=>new Date(y,m,d).getDay();
const adjSal=(y,m,d)=>{const w=getDow(y,m,d);return w===6?d-1:w===0?d+1:d};
const getUtil=m=>[7500,7000,5000,4000,3000,2000,2000,2500,3500,5000,6000,7000][m]||4000;
const szn=m=>[11,0,1].includes(m)?'зима':[2,3,4].includes(m)?'весна':[5,6,7].includes(m)?'літо':'осінь';
const MO=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const fmt=n=>n.toLocaleString('uk-UA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI=n=>Math.round(n).toLocaleString('uk-UA');
const fmtK=n=>n>=1000?(n/1000).toFixed(n%1000===0?0:1)+'k':n.toFixed(0);

/* ——— CREDITS ——— */
const CREDITS=[
  {name:'Золотий Вік',amount:3731.88,day:11,sy:2026,sm:3,total:8,color:'#a78bfa',src:'mono'},
  {name:'Ц',amount:111.07,day:21,sy:2026,sm:2,total:11,color:'#fb923c',src:'mono'},
  {name:'Foxtrot',amount:6133.27,day:24,sy:2026,sm:1,total:15,color:'#34d399',src:'privat'},
  {name:'Comfy',amount:683.25,day:17,sy:2026,sm:3,total:12,color:'#fbbf24',src:'privat'},
];
const crAct=(c,y,m)=>{const s=c.sy*12+c.sm,cur=y*12+m;return cur>=s&&cur<=s+c.total-1};
const crPN=(c,y,m)=>y*12+m-(c.sy*12+c.sm)+1;

/* ——— BUDGET ——— */
const BCAT=[
  {id:'food',name:'Продукти',limit:15000,color:'#f472b6',icon:'\u{1F6D2}'},
  {id:'cafe',name:'Кафе/Ресторани',limit:2000,color:'#fb923c',icon:'\u2615'},
  {id:'transport',name:'Транспорт',limit:500,color:'#94a3b8',icon:'\u{1F68C}'},
  {id:'auto',name:'Авто',limit:8900,color:'#60a5fa',icon:'\u{1F697}'},
  {id:'comm',name:"Зв'язок",limit:500,color:'#a78bfa',icon:'\u{1F4F1}'},
  {id:'subs',name:'Підписки',limit:2000,color:'#c084fc',icon:'\u{1F4FA}'},
  {id:'child',name:'Дитина',limit:6000,color:'#f9a8d4',icon:'\u{1F476}'},
  {id:'health',name:"Здоров'я",limit:2000,color:'#34d399',icon:'\u{1F48A}'},
  {id:'clothes',name:'Одяг',limit:1500,color:'#fbbf24',icon:'\u{1F454}'},
  {id:'home',name:'Дім',limit:1500,color:'#fb7185',icon:'\u{1F3E0}'},
  {id:'fun',name:'Розваги',limit:1500,color:'#22d3ee',icon:'\u{1F3AC}'},
  {id:'gifts',name:'Подарунки',limit:800,color:'#e879f9',icon:'\u{1F381}'},
  {id:'other',name:'Інше',limit:1800,color:'#6b7280',icon:'\u{1F4E6}'},
];
const TOTAL_VAR=BCAT.reduce((s,c)=>s+c.limit,0);

/* demo transactions for UI development */
const DEMO_TX=[
  {day:1,type:'out',cat:'АТБ',amount:892,catId:'food',src:'mono',mcc:5411},
  {day:2,type:'out',cat:'Bolt',amount:67,catId:'transport',src:'mono',mcc:4121},
  {day:3,type:'out',cat:'Сільпо',amount:1435,catId:'food',src:'mono',mcc:5411},
  {day:3,type:'out',cat:'Aroma Kava',amount:145,catId:'cafe',src:'mono',mcc:5812},
  {day:5,type:'out',cat:'WOG',amount:1800,catId:'auto',src:'mono',mcc:5541},
  {day:5,type:'out',cat:'Київстар',amount:250,catId:'comm',src:'manual'},
  {day:7,type:'out',cat:'Netflix',amount:399,catId:'subs',src:'mono',mcc:4899},
  {day:8,type:'out',cat:'АТБ',amount:673,catId:'food',src:'mono',mcc:5411},
  {day:9,type:'out',cat:'Аптека Доброго Дня',amount:385,catId:'health',src:'mono',mcc:5912},
  {day:10,type:'out',cat:'Дитячий світ',amount:1250,catId:'child',src:'mono',mcc:5641},
  {day:12,type:'out',cat:'YouTube Premium',amount:99,catId:'subs',src:'mono',mcc:4899},
  {day:13,type:'out',cat:'Сільпо',amount:2105,catId:'food',src:'mono',mcc:5411},
  {day:14,type:'out',cat:'Zara',amount:2890,catId:'clothes',src:'mono',mcc:5651},
  {day:15,type:'out',cat:'Multiplex',amount:450,catId:'fun',src:'mono',mcc:7832},
  {day:16,type:'out',cat:'Rozetka',amount:780,catId:'gifts',src:'mono',mcc:5399},
  {day:18,type:'out',cat:'Нова Пошта',amount:120,catId:'other',src:'manual'},
  {day:19,type:'out',cat:'АТБ',amount:1156,catId:'food',src:'mono',mcc:5411},
  {day:20,type:'out',cat:'Bolt',amount:89,catId:'transport',src:'mono',mcc:4121},
];

const DOW_UA=['неділя','понеділок','вівторок','середа','четвер','пʼятниця','субота'];
const MON_UA_GEN=['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
function dayLabel(y,m,d){return d+' '+MON_UA_GEN[m]+', '+DOW_UA[new Date(y,m,d).getDay()]}

/* ——— SAVINGS ——— */
const INIT_SAVINGS=49800; /* $1200 × 41.5 UAH */
const GOALS=[
  {id:'cushion',name:'Подушка безпеки',target:240000,color:'#22d3ee',desc:'3 міс витрат'},
  {id:'auto',name:'Фонд Авто',target:750000,color:'#60a5fa',desc:'б/в кросовер $19-22k'},
  {id:'housing',name:'Фонд Житло',target:498000,color:'#a78bfa',desc:'перший внесок'},
];

const TIMELINE_EVENTS=[
  {date:'08.2027',label:'Подушка безпеки повна',c:'#22d3ee',mo:16},
  {date:'04-10.2030',label:'Купівля авто',c:'#60a5fa',mo:48},
  {date:'06.2031',label:'Перший внесок зібрано',c:'#a78bfa',mo:62},
];

/* ——— BUILD MONTH ——— */
function buildMonth(y,m){
  const sal1=adjSal(y,m,6),sal2=adjSal(y,m,21),util=getUtil(m);
  const ev=[];
  ev.push({day:sal1,type:'in',cat:'Зарплата \u00b7 аванс',amount:51000,icon:'\u{1F4B0}',color:'#34d399'});
  ev.push({day:sal2,type:'in',cat:'Зарплата \u00b7 основна',amount:51000,icon:'\u{1F4B0}',color:'#34d399'});
  ev.push({day:1,type:'out',cat:'Оренда',amount:16500,grp:'fixed',icon:'\u{1F3E0}',color:'#fb7185'});
  ev.push({day:10,type:'out',cat:'Комунальні \u00b7 '+szn(m),amount:util,grp:'fixed',icon:'\u{26A1}',color:'#22d3ee'});
  let totalCrd=0;
  CREDITS.forEach(c=>{
    if(crAct(c,y,m)){
      const pn=crPN(c,y,m);totalCrd+=c.amount;
      ev.push({day:c.day,type:'out',cat:c.name,amount:c.amount,grp:'credit',
        icon:'\u{1F4B3}',color:c.color,
        meta:{pn,total:c.total,rem:c.total-pn,src:c.src,color:c.color}});
    }
  });
  /* demo variable expenses */
  DEMO_TX.forEach(tx=>{
    const bc=BCAT.find(b=>b.id===tx.catId);
    ev.push({day:tx.day,type:tx.type,cat:tx.cat,amount:tx.amount,
      icon:bc?bc.icon:'\u{1F4E6}',color:bc?bc.color:'#6b7280',
      src:tx.src,mcc:tx.mcc,catName:bc?bc.name:'Інше'});
  });
  ev.sort((a,b)=>a.day-b.day);
  let bal=0;
  const tl=ev.map(x=>{bal+=x.type==='in'?x.amount:-x.amount;return{...x,bal}});
  const inc=ev.filter(x=>x.type==='in').reduce((s,x)=>s+x.amount,0);
  const fixedExp=16500+util+totalCrd;
  const free=inc-fixedExp;
  const savings=free-TOTAL_VAR;
  const activeCredits=CREDITS.filter(c=>crAct(c,y,m));
  return{y,m,ev,tl,inc,fixedExp,util,free,savings,activeCredits,totalCrd};
}

function getGoalAcc(goal,mi){
  if(goal.id==='cushion')return Math.min(goal.target,INIT_SAVINGS+mi*10000);
  if(goal.id==='auto'){const s=24;return mi>s?Math.min(goal.target,(mi-s)*25000):0}
  if(goal.id==='housing'){const s=18;return mi>s?Math.min(goal.target,(mi-s)*6500):0}
  return 0;
}

/* savings history: total accumulated per month for chart */
function buildSavingsHistory(mi){
  const pts=[];
  for(let i=0;i<=Math.min(mi,36);i++){
    let total=0;
    GOALS.forEach(g=>{total+=getGoalAcc(g,i)});
    const moIdx=(3+i)%12;
    const yr=2026+Math.floor((3+i)/12);
    pts.push({mi:i,total,label:MO[moIdx].slice(0,3)+' '+yr});
  }
  return pts;
}

/* ——— COMPONENTS ——— */
function NavBtn({onClick,children}){
  return h('button',{onClick,style:{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',color:'var(--muted)',width:38,height:38,borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)'}},children);
}

function Chevron({dir}){
  return h('svg',{width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round'},
    h('path',{d:dir==='l'?'M15 18l-6-6 6-6':'M9 18l6-6-6-6'}));
}

function Spark({tl,inc}){
  if(!tl.length)return null;
  const[hover,setHover]=useState(null);
  const svgRef=React.useRef(null);
  const vals=tl.map(t=>t.bal);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=Math.max(maxV-minV,1)*1.15;
  const W=500,H=110,PX=6,PT=14,PB=14;
  const mapY=v=>H-PB-((v-minV)/range)*(H-PT-PB);
  const zeroY=mapY(0);
  const pts=tl.map((t,i)=>{
    const x=PX+(i/(tl.length-1||1))*(W-PX*2);
    return[x,mapY(t.bal)];
  });
  const line=pts.map(p=>p.join(',')).join(' ');
  const areaBase=Math.min(zeroY,H-PB);
  const area=PX+','+areaBase+' '+line+' '+(W-PX)+','+areaBase;
  const minI=vals.indexOf(minV);
  const onMove=e=>{
    const svg=svgRef.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();
    const xPx=e.clientX-rect.left;
    const xRatio=xPx/rect.width;
    const idx=Math.round(xRatio*(tl.length-1));
    setHover(Math.max(0,Math.min(tl.length-1,idx)));
  };
  const hp=hover!==null?pts[hover]:null;
  const hd=hover!==null?tl[hover]:null;
  return h('div',{style:{position:'relative'}},
    h('svg',{ref:svgRef,viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'},
      onPointerMove:onMove,onPointerLeave:()=>setHover(null)},
      h('defs',null,h('linearGradient',{id:'sg',x1:0,y1:0,x2:0,y2:1},
        h('stop',{offset:'0%',stopColor:'#818cf8',stopOpacity:0.18}),
        h('stop',{offset:'100%',stopColor:'#818cf8',stopOpacity:0}))),
      /* zero line */
      minV<0&&h('line',{x1:PX,x2:W-PX,y1:zeroY,y2:zeroY,stroke:'#4e536833',strokeWidth:0.5,strokeDasharray:'4 3'}),
      h('polygon',{points:area,fill:'url(#sg)'}),
      h('polyline',{points:line,fill:'none',stroke:'#818cf8',strokeWidth:1.8,strokeLinejoin:'round',strokeLinecap:'round'}),
      /* points */
      ...pts.map(([x,y],i)=>h('circle',{key:i,cx:x,cy:y,
        r:hover===i?4:i===minI?3:1.5,
        fill:i===minI?'#ef4444':hover===i?'#818cf8':'#12121a',
        stroke:i===minI?'#fca5a5':'#818cf8',strokeWidth:hover===i?1.5:1,
        style:{transition:'r 0.1s'}})),
      /* crosshair */
      hp&&h('line',{x1:hp[0],x2:hp[0],y1:PT-4,y2:H-PB+4,stroke:'#818cf855',strokeWidth:0.8,strokeDasharray:'3 2'}),
      /* labels */
      h('text',{x:pts[0][0]+3,y:pts[0][1]+(vals[0]<0?10:-6),fill:vals[0]<0?'#f8717199':'#4e536866',
        fontSize:7,fontWeight:500,fontFamily:'inherit'},fmtI(vals[0])),
      h('text',{x:pts[pts.length-1][0]-3,y:pts[pts.length-1][1]-6,fill:'#a5b4fc88',
        fontSize:7,fontWeight:500,textAnchor:'end',fontFamily:'inherit'},fmtI(vals[vals.length-1])),
      minV<0&&h('text',{x:pts[minI][0],y:pts[minI][1]+10,fill:'#f8717177',
        fontSize:6.5,fontWeight:500,textAnchor:'middle',fontFamily:'inherit'},fmtI(minV)),
      /* invisible overlay */
      h('rect',{x:0,y:0,width:W,height:H,fill:'transparent',style:{cursor:'crosshair'}})
    ),
    hp&&hd&&h('div',{className:'tip',style:{left:(hp[0]/W*100)+'%',top:Math.max(0,hp[1]/H*100-30)+'%'}},
      hd.cat+': '+(hd.type==='in'?'+':'\u2212')+fmtI(hd.amount)+' \u20b4 \u00b7 бал: '+fmtI(hd.bal))
  );
}

function Row({ev,last}){
  const isIn=ev.type==='in',accent=isIn?'var(--green)':'var(--red)';
  const bgAlpha=isIn?'rgba(52,211,153,0.08)':((ev.color||'#888')+'14');
  return h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:last?'none':'1px solid var(--border2)'}},
    h('div',{style:{width:38,height:38,borderRadius:12,background:bgAlpha,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}},
      ev.icon||'\u{1F4E6}'),
    h('div',{style:{flex:1,minWidth:0}},
      h('div',{style:{fontSize:13,fontWeight:500,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ev.cat),
      h('div',{style:{fontSize:10,color:'var(--muted)',marginTop:2,display:'flex',alignItems:'center',gap:4}},
        ev.src&&h('span',null,ev.src==='mono'?'mono':ev.src==='manual'?'вручну':'telegram'),
        ev.mcc&&h('span',null,'\u00b7 '+ev.mcc),
        ev.meta&&h(Fragment,null,
          h('span',{style:{width:5,height:5,borderRadius:'50%',background:ev.meta.color,display:'inline-block'}}),
          (ev.meta.src==='mono'?'mono':'ПриватБанк')+' \u00b7 '+ev.meta.pn+'/'+ev.meta.total),
        ev.catName&&!ev.meta&&h('span',null,(ev.src?'\u00b7 ':'')+ev.catName))),
    h('div',{style:{textAlign:'right',flexShrink:0}},
      h('div',{style:{fontSize:14,fontWeight:600,fontVariantNumeric:'tabular-nums',color:accent}},(isIn?'+':'\u2212')+fmt(ev.amount)),
      h('div',{style:{fontSize:10,color:'var(--muted2)',fontVariantNumeric:'tabular-nums'}},fmtI(ev.bal)))
  );

function BudgetRow({cat}){

/* donut chart */
function Donut({segments,total}){
  const[hover,setHover]=useState(null);
  const SIZE=160,CX=80,CY=80,R=58,SW=28;
  const C=2*Math.PI*R;
  const GAP=2;
  const totalVal=segments.reduce((s,x)=>s+x.v,0);
  let offset=0;
  const arcs=segments.map((seg,i)=>{
    const pct=seg.v/totalVal;
    const len=pct*C-GAP;
    const dash=Math.max(0,len);
    const o=offset;
    const midAngle=((o+pct*C/2)/C)*2*Math.PI-Math.PI/2;
    const tx=CX+Math.cos(midAngle)*(R);
    const ty=CY+Math.sin(midAngle)*(R);
    offset+=pct*C;
    return h('circle',{key:i,cx:CX,cy:CY,r:R,fill:'none',
      stroke:seg.c,strokeWidth:hover===i?SW+6:SW,
      strokeDasharray:dash+' '+(C-dash),strokeDashoffset:-o,
      style:{transition:'stroke-dashoffset 0.8s ease-out '+(i*0.1)+'s, stroke-width 0.15s',cursor:'pointer',pointerEvents:'stroke'},
      onPointerEnter:()=>setHover(i),onPointerLeave:()=>setHover(null)});
  });
  const hSeg=hover!==null?segments[hover]:null;
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:14}},
    h('div',{style:{position:'relative',width:SIZE,height:SIZE}},
      h('svg',{width:SIZE,height:SIZE,viewBox:'0 0 '+SIZE+' '+SIZE,
        style:{transform:'rotate(-90deg)',display:'block'}},
        h('circle',{cx:CX,cy:CY,r:R,fill:'none',stroke:'var(--border)',strokeWidth:SW}),
        ...arcs),
      h('div',{style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
        h('div',{style:{fontSize:22,fontWeight:800,color:'var(--head)',fontVariantNumeric:'tabular-nums'}},hSeg?fmtI(hSeg.v):fmtK(total)),
        h('div',{style:{fontSize:10,color:'var(--muted)',fontWeight:600,marginTop:1}},hSeg?hSeg.l+' ('+((hSeg.v/totalVal)*100).toFixed(0)+'%)':'витрати'))),
    h('div',{style:{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:'6px 14px'}},
      ...segments.map((s,i)=>h('span',{key:i,
        onPointerEnter:()=>setHover(i),onPointerLeave:()=>setHover(null),
        style:{fontSize:10,color:hover===i?'var(--text2)':'var(--muted)',display:'flex',alignItems:'center',gap:4,cursor:'pointer',transition:'color 0.15s'}},
        h('span',{style:{width:8,height:8,borderRadius:3,background:s.c,display:'inline-block'}}),
        s.l+' '+fmtK(s.v))))
  );
}

/* savings history area chart */
function SavingsChart({mi}){
  const[hover,setHover]=useState(null);
  const svgRef2=React.useRef(null);
  const pts=buildSavingsHistory(mi);
  if(pts.length<2)return null;
  const W=500,H=90,PX=6,PT=10,PB=8;
  const mx=Math.max(...pts.map(p=>p.total))*1.1||1;
  const coords=pts.map((p,i)=>[
    PX+(i/(pts.length-1))*(W-PX*2),
    H-PB-(p.total/mx)*(H-PT-PB)
  ]);
  const line=coords.map(c=>c.join(',')).join(' ');
  const area=PX+','+(H-PB)+' '+line+' '+(W-PX)+','+(H-PB);
  const onMove=e=>{
    const svg=svgRef2.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();
    const idx=Math.round((e.clientX-rect.left)/rect.width*(pts.length-1));
    setHover(Math.max(0,Math.min(pts.length-1,idx)));
  };
  const hp=hover!==null?coords[hover]:null;
  return h(Card,{noPress:true,style:{marginBottom:12}},
    h(CardLabel,{text:'Історія накопичень'}),
    h('div',{style:{position:'relative'}},
      h('svg',{ref:svgRef2,viewBox:'0 0 '+W+' '+H,style:{width:'100%',display:'block'},
        onPointerMove:onMove,onPointerLeave:()=>setHover(null)},
        h('defs',null,h('linearGradient',{id:'savG',x1:0,y1:0,x2:0,y2:1},
          h('stop',{offset:'0%',stopColor:'#22d3ee',stopOpacity:0.25}),
          h('stop',{offset:'100%',stopColor:'#22d3ee',stopOpacity:0}))),
        h('polygon',{points:area,fill:'url(#savG)'}),
        h('polyline',{points:line,fill:'none',stroke:'#22d3ee',strokeWidth:1.8,strokeLinejoin:'round',strokeLinecap:'round'}),
        ...coords.map(([x,y],i)=>h('circle',{key:i,cx:x,cy:y,
          r:hover===i?4:i===pts.length-1?3:1.5,
          fill:i===pts.length-1?'#22d3ee':hover===i?'#22d3ee':'#12121a',
          stroke:'#22d3ee',strokeWidth:1,
          style:{transition:'r 0.1s'}})),
        hp&&h('line',{x1:hp[0],x2:hp[0],y1:PT-2,y2:H-PB+2,stroke:'#22d3ee55',strokeWidth:0.8,strokeDasharray:'3 2'}),
        h('rect',{x:0,y:0,width:W,height:H,fill:'transparent',style:{cursor:'crosshair'}})
      ),
      hp&&h('div',{className:'tip',style:{left:(hp[0]/W*100)+'%',top:Math.max(0,hp[1]/H*100-34)+'%'}},
        pts[hover].label+': '+fmtI(pts[hover].total)+' \u20b4'),
      h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--muted)',marginTop:4}},
        h('span',null,pts[0].label),
        h('span',null,fmtI(pts[pts.length-1].total)+' \u20b4'))
    )
  );
}

          h(CardLabel,{text:'Горизонт подій'}),
          ...TIMELINE_EVENTS.map((ev,i)=>{
            const done=mi>=ev.mo;
            return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'8px 0'}},
              h('div',{style:{width:8,height:8,borderRadius:'50%',background:done?'var(--green)':ev.c,border:done?'none':'2px solid '+ev.c,flexShrink:0,boxSizing:'border-box'}}),
              h('div',{style:{flex:1}},h('span',{style:{fontSize:12,color:done?'var(--green)':'var(--text)',fontWeight:500,textDecoration:done?'line-through':'none'}},ev.label)),
              h('span',{style:{fontSize:11,color:'var(--muted)',fontVariantNumeric:'tabular-nums'}},ev.date));
          }))
      )
     )/* /tab-page */
    ),

    /* bottom tab bar */
    h('div',{className:'tab-bar'},
      ...tabs.map(t=>{
        const active=tab===t.id;
        return h('button',{key:t.id,className:'tab-btn',onClick:()=>setTab(t.id),
          style:{color:active?'#a0a4ff':'#5c5f80'}},
          h(TabIcon,{id:t.id,active}),h('span',null,t.l));
      }))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

/* register SW */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* portrait lock (standalone PWA) */
if(screen.orientation&&screen.orientation.lock){
  screen.orientation.lock('portrait').catch(()=>{});
}
</script>
</body>
</html>
